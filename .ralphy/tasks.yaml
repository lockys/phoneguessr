tasks:
  - title: "Setup: Add root dev script"
    parallel_group: 1
    completed: true
    description: |
      Change: openspec/changes/local-dev-setup/
      Read: proposal.md, design.md, specs/local-dev-workflow/spec.md

      Add a dev script to the root package.json:
      1. Add `"dev": "vercel dev"` to the scripts section of root `package.json`
      2. Verify `npm run dev` starts vercel dev at http://localhost:3000
      3. Confirm the Modern.js frontend loads and API routes are accessible

      Constraints:
      - Root package.json already has `"type": "module"` and dependencies
      - vercel.json already has `devCommand: "cd phoneguessr && npm run dev"`
      - Do NOT add other scripts — previous attempt caused recursive invocation
  - title: "QA: Test all API endpoints locally"
    parallel_group: 2
    completed: true
    description: >
      Change: openspec/changes/local-dev-setup/

      Read: specs/local-dev-workflow/spec.md, specs/deployment/spec.md


      With `vercel dev` running, test every API endpoint via curl:


      GET endpoints:

      1. GET /api/phones — returns 120 phones with id, brand, model

      2. GET /api/puzzle/today — returns puzzleId, puzzleNumber, puzzleDate,
      imageUrl

      3. GET /api/puzzle/image — returns base64 image data (imageData field)

      4. GET /api/puzzle/yesterday — returns puzzle data or null/404

      5. GET /api/leaderboard/daily — returns entries array

      6. GET /api/auth/me — returns {user: null} when unauthenticated


      POST endpoints (need request body):

      7. POST /api/guess — body: {puzzleId, phoneId, guessNumber} → returns
      feedback

      8. POST /api/result — body: {puzzleId, guessCount, isWin, elapsedSeconds}
      → returns score

      9. POST /api/hint — body: {puzzleId, hintType: "brand"} → returns hint
      data


      Auth-protected endpoints (expect 401 without session):

      10. GET /api/profile/stats — returns stats or 401

      11. POST /api/profile/update — body: {displayName} → returns success or
      401


      Constraints:

      - API routes use flat files + Vercel rewrites (not dynamic [action].ts)

      - puzzle/leaderboard/profile routes are rewritten via vercel.json

      - All imports use .js extensions for ESM
  - title: "QA: Verify mock mode still works"
    parallel_group: 2
    completed: true
    description: |
      Change: openspec/changes/local-dev-setup/
      Read: specs/mock-api/spec.md

      Verify the mock development mode works after BFF removal:

      1. Run `cd phoneguessr && npm run dev:mock` — server should start
      2. Open in browser — game should load with mock puzzle data
      3. Submit a guess — should get feedback response
      4. Complete a game — result should show score

      Note: Mock mode runs Modern.js ONLY (no Vercel, no database).
      The BFF plugin was removed from modern.config.ts — mock handlers
      in phoneguessr/src/ must still intercept API calls.
      If mock mode is broken, document what fails.
  - title: "QA: Verify frontend game flow"
    parallel_group: 2
    completed: true
    description: >
      Change: openspec/changes/local-dev-setup/

      Read: specs/local-dev-workflow/spec.md


      With `vercel dev` running (real Neon database), verify the full frontend:


      1. Open http://localhost:3000 in browser

      2. Check browser console for errors — should be clean

      3. Daily puzzle image renders (fetched from /api/puzzle/image)

      4. Phone autocomplete input populates with phone names (from /api/phones)

      5. Type a phone name and select from dropdown

      6. Submit guess — feedback appears in guess history

      7. Game completes — result modal shows score


      Constraints:

      - The frontend fetches from /api/* which Vercel routes to serverless
      functions

      - Images are served as base64 data URLs from the puzzle endpoint

      - No authentication required for basic game flow
  - title: "Deploy: Push and verify Vercel production"
    parallel_group: 3
    completed: true
    description: |
      Change: openspec/changes/local-dev-setup/
      Read: specs/deployment/spec.md

      After all verification passes:

      1. Commit any remaining changes from verification fixes
      2. Push to GitHub — Vercel auto-deploys from main branch
      3. Wait for Vercel build to succeed (check deployment status)
      4. Test production API endpoints:
         - GET https://<domain>/api/phones — returns phone list
         - GET https://<domain>/api/puzzle/today — returns puzzle data
         - GET https://<domain>/api/leaderboard/daily — returns entries
      5. Load the production URL in browser — game should be playable

      Constraints:
      - Most changes already committed and pushed (0c5c736)
      - Check Vercel dashboard for build errors
      - Function count must stay at 11 or fewer (Hobby plan limit: 12)
