tasks:
  # ═══════════════════════════════════════════════════════════
  # CHANGE 1: image-anti-cheat (server-side progressive crops)
  # ═══════════════════════════════════════════════════════════

  - title: "Anti-Cheat: Sharp crop utility and JWT token"
    parallel_group: 1
    completed: false
    model: sonnet  # Standard library integration (Sharp + jose), unit tests
    description: |
      Change: openspec/changes/image-anti-cheat/
      Read: proposal.md, design.md, specs/progressive-image-serving/spec.md

      Tasks 1.1–1.4 (Sharp Integration) and 2.1–2.4 (JWT Token):

      1. Add `sharp` as production dependency
      2. Create `phoneguessr/src/lib/image-crop.ts` — `generateCrop(imagePath, level)` returns cropped base64 data URL using centered crop from ZOOM_LEVELS
      3. Define shared `ZOOM_LEVELS` array [4.17, 2.5, 1.79, 1.39, 1.14, 1.0] in a constants file
      4. Write unit tests for generateCrop (dimensions at each level, level 5 = full image)
      5. Create `phoneguessr/src/lib/image-token.ts` — signImageToken/verifyImageToken using jose with IMAGE_TOKEN_SECRET env var
      6. Token expires at midnight UTC of puzzle day
      7. Write unit tests for token sign/verify (valid, expired, tampered)

      Constraints:
      - sharp is a native dependency — test that it works in Node.js (API handler context)
      - Reuse jose from existing auth code for JWT signing
      - ZOOM_LEVELS must match exactly the array CropReveal.tsx currently uses

  - title: "Anti-Cheat: Progressive image API endpoint"
    parallel_group: 2
    completed: false
    model: sonnet  # API endpoint with auth branching, follows established patterns
    description: |
      Change: openspec/changes/image-anti-cheat/
      Read: design.md, specs/progressive-image-serving/spec.md, specs/image-protection/spec.md

      Tasks 3.1–3.6 (API Endpoint):

      1. Modify `image` case in `api/puzzle.ts` to accept `level` query parameter (default: 0)
      2. Authenticated users: query guesses table to count guesses; reject if level > guessCount (403). If results exist, allow any level.
      3. Unauthenticated users: validate JWT token param; reject if token level < level-1 (403). First request (no token) gets level 0.
      4. Call generateCrop(imagePath, level) to produce cropped base64
      5. Include signed token in response for unauthenticated users
      6. Response format: { imageData: "data:image/jpeg;base64,...", token?: "jwt..." }

      Constraints:
      - Must import from image-crop.ts and image-token.ts created in previous task
      - Keep existing puzzle actions (today, yesterday, state) unchanged
      - 403 response for level skipping attempts

  - title: "Anti-Cheat: Client-side progressive fetch and CropReveal"
    parallel_group: 3
    completed: false
    model: opus  # Major Game.tsx + CropReveal refactor, complex state mgmt, animation, dual auth paths
    description: |
      Change: openspec/changes/image-anti-cheat/
      Read: design.md, specs/progressive-image-serving/spec.md

      Tasks 4.1–4.6 (Game.tsx) and 5.1–5.4 (CropReveal.tsx):

      Game.tsx changes:
      1. Replace single upfront image fetch with per-level fetchCropAtLevel(level)
      2. Fetch level 0 on initial load
      3. After each wrong guess, fetch next level (level = guesses.length)
      4. On game end, fetch level 5 (full image) for reveal
      5. For unauthenticated users: store JWT token from response, pass as &token= on next request
      6. Handle 403 errors gracefully

      CropReveal.tsx changes:
      1. Remove ZOOM_LEVELS array and zoom-based drawImage scaling
      2. Draw received image at scale 1.0 (server provides correctly cropped region)
      3. Crossfade transition between crop levels (400ms)
      4. Keep reveal animation (win bouncy / loss ease-out) — full image at level 5

      Constraints:
      - CropReveal no longer does cropping — just displays what the server sends
      - Must handle both authenticated (no token) and anonymous (token) paths

  - title: "Anti-Cheat: Mock API and verification"
    parallel_group: 4
    completed: false
    model: haiku  # Mock route additions, manual verification steps
    description: |
      Change: openspec/changes/image-anti-cheat/
      Read: design.md, tasks.md

      Tasks 6.1–6.3 (Mock API) and 7.1–7.8 (Verification):

      1. Add getMockCroppedImage(level) to src/mock/state.ts using sharp
      2. Update mock API route handler to support level parameter
      3. Mock mode skips level validation (no auth/token checks)
      4. Verify: network tab shows only cropped region at each level
      5. Verify: requesting higher level than guesses returns 403
      6. Verify: JWT token flow works for unauthenticated users
      7. Verify: full image only served after game completion
      8. Verify: crop dimensions match expected zoom levels visually
      9. Verify: reveal animation works correctly
      10. Verify: mock mode progressive crops work
      11. Run npm run build and npm run test — all pass

  # ═══════════════════════════════════════════════════════════
  # CHANGE 2: passkey-auth (WebAuthn biometric login)
  # ═══════════════════════════════════════════════════════════

  - title: "Passkey: Dependencies, schema, and challenge store"
    parallel_group: 5
    completed: false
    model: sonnet  # Schema migration, dependency setup, simple TTL store
    description: |
      Change: openspec/changes/passkey-auth/
      Read: proposal.md, design.md, specs/passkey-auth/spec.md

      Tasks 1.1–1.4 (Dependencies), 2.1–2.3 (Schema), 3.1 (Challenge Store):

      1. Install @simplewebauthn/server (v11+) in project root
      2. Install @simplewebauthn/browser in phoneguessr/
      3. Add env vars: WEBAUTHN_RP_ID, WEBAUTHN_RP_NAME, WEBAUTHN_ORIGIN with dev defaults
      4. Create phoneguessr/src/lib/webauthn.ts — RP config helpers reading from env vars
      5. Add passkey_credentials table to schema.ts (id, userId FK, credentialId text unique, publicKey text, counter integer, transports text, createdAt)
      6. Run drizzle-kit generate and drizzle-kit push
      7. Create phoneguessr/src/lib/challenge-store.ts — in-memory Map with 60s TTL auto-cleanup

      Constraints:
      - @simplewebauthn/server goes in ROOT package.json (API functions run from root)
      - @simplewebauthn/browser goes in phoneguessr/package.json (frontend)
      - Challenge store uses setInterval for TTL cleanup

  - title: "Passkey: Registration and login API endpoints"
    parallel_group: 6
    completed: false
    model: opus  # Security-critical WebAuthn flows, 4 new endpoints, credential management
    description: |
      Change: openspec/changes/passkey-auth/
      Read: design.md, specs/passkey-auth/spec.md

      Tasks 4.1–4.2 (Registration API) and 5.1–5.2 (Login API):

      1. Create api/auth/passkey/register-options.ts — GET, requires session auth, generates options via generateRegistrationOptions(), stores challenge, returns JSON
      2. Create api/auth/passkey/register.ts — POST, requires session auth, verifies via verifyRegistrationResponse(), upserts credential in passkey_credentials
      3. Create api/auth/passkey/login-options.ts — POST, no auth required, accepts optional email to look up credentials, generates options via generateAuthenticationOptions(), stores challenge
      4. Create api/auth/passkey/login.ts — POST, no auth required, verifies via verifyAuthenticationResponse(), updates counter, creates session via createSessionToken(), sets cookie

      Constraints:
      - Must add Vercel rewrites in vercel.json for /api/auth/passkey/* routes
      - Reuse createSessionToken() and cookie helpers from existing auth code
      - Login produces identical session to Google OAuth (transparent to rest of app)

  - title: "Passkey: Frontend auth context and UI"
    parallel_group: 7
    completed: false
    model: opus  # Auth context refactor, WebAuthn browser integration, multi-component UI changes
    description: |
      Change: openspec/changes/passkey-auth/
      Read: design.md, specs/passkey-auth/spec.md, specs/user-auth/spec.md

      Tasks 6.1–6.4 (Auth Context), 7.1–7.3 (Login UI), 8.1–8.3 (Registration UI):

      Auth context:
      1. Add loginWithPasskey() to AuthProvider — calls login-options then login using startAuthentication()
      2. Add registerPasskey() — calls register-options then register using startRegistration()
      3. Add hasPasskey state (from /api/auth/me or dedicated endpoint)
      4. Add WebAuthn feature detection via browserSupportsWebAuthn()

      Login UI:
      5. Update AuthButton.tsx — "Sign in with Passkey" button alongside Google OAuth when WebAuthn supported
      6. Handle passkey login errors with user-friendly messages
      7. Add loading state during auth flow

      Registration UI:
      8. Add passkey section to ProfilePanel — "Set up Passkey" when no passkey, "Passkey registered" when set up
      9. Handle registration success/failure
      10. Add option to re-register (replace) existing passkey

  - title: "Passkey: Mock API and verification"
    parallel_group: 8
    completed: false
    model: haiku  # Mock routes, verification checklist
    description: |
      Change: openspec/changes/passkey-auth/
      Read: tasks.md

      Tasks 9.1–9.3 (Mock API) and 10.1–10.6 (Verification):

      1. Add mock routes for all 4 passkey endpoints in mock/middleware.ts
      2. Mock register: simulate success, track mock passkey state
      3. Mock login: simulate successful passkey auth, return mock user session
      4. Test e2e: Google sign-in → register passkey → verify credential in DB
      5. Test e2e: sign out → sign in with passkey → verify session created
      6. Test error cases: expired challenge, invalid assertion, unauthenticated registration, counter mismatch
      7. Test WebAuthn feature detection (passkey UI hidden on unsupported browsers)
      8. Test mock API mode works for all passkey endpoints
      9. Verify existing Google OAuth flow unaffected
      10. Run npm run build and npm run test

  # ═══════════════════════════════════════════════════════════
  # CHANGE 3: phone-image-collection (expand phone catalog)
  # ═══════════════════════════════════════════════════════════

  - title: "Phone Images: Scraping script setup and HTTP fetching"
    parallel_group: 9
    completed: false
    model: sonnet  # Cheerio scraping, HTTP handling, pagination — established patterns
    description: |
      Change: openspec/changes/phone-image-collection/
      Read: proposal.md, design.md, specs/phone-image-pipeline/spec.md

      Tasks 1.1–1.4 (Setup) and 2.1–2.6 (Scraping):

      1. Install cheerio and sharp as dev dependencies in phoneguessr
      2. Create phoneguessr/scripts/collect-images.ts with CLI structure
      3. Define brand config array mapping 130+ brand names to GSMArena URL slugs
      4. Implement HTTP fetch wrapper with 1-2s delay, User-Agent, retry (3 attempts), error logging
      5. Implement brand listing page parser using cheerio
      6. Handle pagination on brand listing pages
      7. Implement phone detail page parser (image URL, release date, form factor)
      8. Implement image download to staging directory (phoneguessr/scripts/.staging/)
      9. Add resumability (skip already-downloaded images)
      10. Test scraper on 3-5 brands (Apple, Nokia, Motorola, Benefon, Alcatel)

      Constraints:
      - Polite scraping: 1-2s between requests, proper User-Agent
      - .staging/ added to .gitignore
      - GSMArena URL format: gsmarena.com/{brand-slug}-phones-{id}.php

  - title: "Phone Images: Processing, selection, and metadata"
    parallel_group: 10
    completed: false
    model: sonnet  # Image processing pipeline, selection algorithm, metadata generation
    description: |
      Change: openspec/changes/phone-image-collection/
      Read: design.md, specs/phone-image-pipeline/spec.md, specs/phone-data/spec.md

      Tasks 3.1–3.5 (Processing), 4.1–4.4 (Selection), 5.1–5.6 (Metadata):

      Image processing:
      1. sharp resize to max 800px width, convert to JPEG, optimize to <200KB
      2. Skip images below 200x200px
      3. File naming: lowercase kebab-case (+ -> -plus, strip parens, collapse hyphens)
      4. Save to phoneguessr/config/public/phones/
      5. Generate processing report

      Model selection:
      6. Per-brand sort by popularity/recency, pick top 2-5
      7. Brand tier config: major (5), mid-tier (3-4), niche (2)
      8. Manual override config (phone-overrides.json)
      9. Run selection on all brands, review counts

      Metadata:
      10. Extract releaseYear from GSMArena date strings
      11. Infer priceTier from brand/model positioning
      12. Detect formFactor (flip/fold/bar)
      13. Assign difficulty (easy/medium/hard by brand tier)
      14. Generate phone-data.json entries
      15. Merge with existing 20 phones (preserve existing entries)

  - title: "Phone Images: Validation, mock data, and cleanup"
    parallel_group: 11
    completed: false
    model: haiku  # Validation scripts, mock data expansion, cleanup
    description: |
      Change: openspec/changes/phone-image-collection/
      Read: tasks.md, specs/phone-data/spec.md

      Tasks 6.1–6.6 (Validation), 7.1–7.3 (Mock Data), 8.1–8.4 (Cleanup):

      1. Create validation script (phoneguessr/scripts/validate-phone-data.ts): all fields present, valid enums, no duplicates, images exist
      2. Validate 100+ distinct brands in final dataset
      3. Validate difficulty distribution (20% easy, 25% medium, 30% hard)
      4. Validate image integrity (valid JPEG, non-empty, <200KB)
      5. Validate backward compatibility (original 20 phones unchanged)
      6. Run seed script against database
      7. Expand MOCK_PHONES in src/mock/data.ts to 60-80 phones
      8. Ensure mock data covers all difficulty tiers and diverse brands
      9. Add collect-images npm script
      10. Add .staging/ to .gitignore
      11. Remove/update generate-placeholders.ts
      12. Run full end-to-end: scrape → process → generate → validate → seed
      13. Run npm run build and npm run test

