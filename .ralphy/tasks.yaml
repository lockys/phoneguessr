    description: |
      Change: openspec/changes/test-coverage/
      Read: proposal.md, design.md, specs/test-coverage/spec.md

      Tasks 1.1–1.3 (Infrastructure) and 2.1 (Game.tsx):

      1. Create phoneguessr/src/test/mock-db.ts — reusable drizzle db mock factory with chainable .select().from().where().innerJoin().orderBy().limit()
      2. Create phoneguessr/src/test/mock-fetch.ts — URL pattern → JSON response mapper for vi.stubGlobal('fetch')
      3. Create phoneguessr/src/test/mock-auth.ts — helper to create test session tokens and build Request objects with cookies

      4. Create phoneguessr/src/components/Game.test.tsx:
