# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

project:
  name: "phoneguessr"
  language: "TypeScript"
  framework: "Modern.js"
  description: "Daily phone guessing game - identify phones from cropped photos"

models:
  # Model assignment by task complexity
  # opus:   Multi-file refactors, security-critical flows, complex state management, architectural decisions
  # sonnet: Standard feature implementation, API endpoints, utility libraries, moderate test suites
  # haiku:  Mock data, validation scripts, verification steps, config changes, straightforward tests
  default: "sonnet"

commands:
  dev: "vercel dev"
  build: "cd phoneguessr && npm run build"
  lint: "cd phoneguessr && npx biome check"
  typecheck: "cd phoneguessr && npx tsc --noEmit"
  pre_commit: "claude --dangerously-skip-permissions -p '/simplify'"

rules:
  # Architecture
  - "API endpoints live in api/*.ts at the repo root (Vercel serverless functions)"
  - "API uses Web API Request/Response — no Hono, no BFF plugin"
  - "Dynamic routes use flat files + Vercel rewrites in vercel.json (not [action].ts)"
  - "Database: @neondatabase/serverless with drizzle-orm/neon-http"
  - "All imports use .js extensions for ESM compatibility"
  - "Frontend is in phoneguessr/src/, API imports from phoneguessr/src/ via relative paths"

  # Frontend
  - "Use React 19 with functional components and hooks"
  - "Use i18next for all user-facing strings - support en, zh-TW, zh-CN, ja, ko"
  - "Use CSS classes in phoneguessr/src/routes/index.css - no CSS modules or styled-components"
  - "Use Biome for linting, not ESLint"

  # Code quality
  - "Before committing, run /simplify on all changed files to review for reuse, quality, and efficiency — fix any issues found before the commit"

  # Merge conflict handling
  - "When merging branches, .ralphy/progress.txt conflicts must use union strategy — keep ALL lines from both current and incoming (never discard either side)"
  - "For .ralphy/progress.txt merge conflicts: accept both current and incoming changes (git checkout --merge then keep all content)"

  # Verification
  - "Use Chrome DevTools MCP tools for runtime verification: navigate pages, check console errors/warnings, inspect network requests, take screenshots"
  - "After implementing UI or API changes, reload localhost:8080 via chrome-devtools MCP and check for console errors/warnings"
  - "Available MCP tools: navigate_page, list_console_messages, list_network_requests, take_screenshot, evaluate_script, etc."

  # OpenSpec integration (Model C — scoped Ralphy runs)
  - "Before implementing, read openspec/changes/*/tasks.md for the task list"
  - "Read proposal.md, design.md, and specs/*.md in the same change directory for context"
  - "Only implement tasks marked - [ ] in tasks.md"
  - "Do not create new files outside the scope defined in the change's design.md"
  - "Read openspec/specs/ for current system requirements before generating code"

merge:
  conflict_resolution:
    ".ralphy/progress.txt": "union"  # Accept both incoming and current changes (append all entries)

boundaries:
  never_touch:
    - "*.lock"
    - "phoneguessr/dist/**"
    - "phoneguessr/node_modules/**"
    - "phoneguessr/src/db/migrations/**"
    - "openspec/specs/**"
