# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

project:
  name: "phoneguessr"
  language: "TypeScript"
  framework: "Modern.js"
  description: "Daily phone guessing game - identify phones from cropped photos"

commands:
  dev: "cd phoneguessr && npm run dev:mock"
  build: "cd phoneguessr && npm run build"
  lint: "cd phoneguessr && npx biome check"
  typecheck: "cd phoneguessr && npx tsc --noEmit"

rules:
  - "Use React 19 with functional components and hooks"
  - "Use i18next for all user-facing strings - support en, zh-TW, zh-CN, ja, ko"
  - "API endpoints live in phoneguessr/api/lambda/ and use Hono context"
  - "Check IS_MOCK before calling useHonoContext() in API endpoints"
  - "Use CSS classes in phoneguessr/src/routes/index.css - no CSS modules or styled-components"
  - "Use Biome for linting, not ESLint"

boundaries:
  never_touch:
    - "*.lock"
    - "phoneguessr/dist/**"
    - "phoneguessr/node_modules/**"
    - "phoneguessr/src/db/migrations/**"
