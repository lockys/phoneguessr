name: Auto-Fix

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  deployment_status: {}

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'failure' && github.event.deployment.environment == 'Production')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_FIX_TOKEN }}
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phoneguessr/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: phoneguessr

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@1

      - name: Loop-cap guard
        id: guard
        run: |
          count=$(git --no-pager log --oneline | awk 'BEGIN{c=0} /^[a-f0-9]+ fix\(auto\):/{c++} !/^[a-f0-9]+ fix\(auto\):/{exit} END{print c}')
          count=${count:-0}
          echo "consecutive_fixes=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -ge 3 ]; then
            echo "Auto-fix cap reached ($count consecutive fix(auto): commits). Aborting."
            exit 0
          fi

      - name: Fetch CI failure logs
        if: github.event_name == 'workflow_run' && steps.guard.outputs.consecutive_fixes < 3
        env:
          GH_TOKEN: ${{ secrets.AUTO_FIX_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          # Download logs for the failed run
          gh run view "$RUN_ID" --log-failed 2>/dev/null > /tmp/failure-logs.txt || \
            gh run view "$RUN_ID" --log 2>/dev/null | tail -200 > /tmp/failure-logs.txt || \
            echo "Could not fetch CI logs for run $RUN_ID" > /tmp/failure-logs.txt

      - name: Fetch Vercel failure logs
        if: github.event_name == 'deployment_status' && steps.guard.outputs.consecutive_fixes < 3
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          LOG_URL="${{ github.event.deployment_status.log_url }}"
          if [ -n "$LOG_URL" ]; then
            curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "$LOG_URL" | tail -200 > /tmp/failure-logs.txt || \
              echo "Vercel deployment failed. Could not fetch logs (check VERCEL_TOKEN secret)." > /tmp/failure-logs.txt
          else
            echo "Vercel deployment failed. Log URL not available. Check Vercel dashboard." > /tmp/failure-logs.txt
          fi

      - name: Configure git identity
        if: steps.guard.outputs.consecutive_fixes < 3
        run: |
          git config user.name "Auto-Fix Bot"
          git config user.email "auto-fix@users.noreply.github.com"

      - name: Run Claude Code auto-fix
        if: steps.guard.outputs.consecutive_fixes < 3
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT="You are an automated fix agent for the PhoneGuessr repo.

A CI/deployment failure occurred. See /tmp/failure-logs.txt for the CI/deployment failure output.

Instructions:
1. Read /tmp/failure-logs.txt to understand the failure
2. Identify the root cause and edit the necessary files to fix it
3. Stage all changes and commit with message: \"fix(auto): <brief description>\"
4. Do NOT push — the workflow will verify lint/test and then handle the push
5. If you cannot determine a safe fix, create a file \`.auto-fix-failed\` with a brief explanation of why, then stop
6. After committing (or creating .auto-fix-failed), stop — do not take further actions"

          claude -p "$PROMPT" --allowedTools "Edit,Read,Glob,Grep"

      - name: Push fix or abort
        if: steps.guard.outputs.consecutive_fixes < 3
        run: |
          if [ -f ".auto-fix-failed" ]; then
            echo "Claude could not determine a safe fix:"
            cat .auto-fix-failed
            exit 0
          fi
          # Check if Claude made a fix commit
          if ! git --no-pager log --oneline -1 | grep -q "^[a-f0-9]* fix(auto):"; then
            echo "No fix(auto): commit found. Nothing to push."
            exit 0
          fi
          git push origin main
