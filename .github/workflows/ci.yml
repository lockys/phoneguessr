name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phoneguessr/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: phoneguessr

      - name: Lint
        run: npm run lint
        working-directory: phoneguessr

      - name: Test
        run: npm run test
        working-directory: phoneguessr

      - name: Build
        run: npm run build
        working-directory: phoneguessr
